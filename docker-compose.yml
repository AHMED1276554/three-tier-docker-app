version: '3.8'

services:
  database:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend_service
    depends_on:
      - database
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: frontend_service
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
